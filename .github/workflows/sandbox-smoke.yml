name: Sandbox Smoke + Auto-Promote

# Smoke-tests a newly built thin image against a real Daytona sandbox.
# On pass: retags → stable on GHCR + Docker Hub, patches Dokploy DAYTONA_SNAPSHOT + redeploys API.
# On fail: records failure in circuit breaker state file.
#
# Triggered by sandbox-build.yml (workflow_dispatch) after every successful thin build.

on:
  workflow_dispatch:
    inputs:
      dh_tag:
        description: 'Docker Hub image tag (e.g. epsilonaicrypto/computer:next-abc1234)'
        required: true
      ghcr_tag:
        description: 'GHCR image tag (e.g. ghcr.io/deptrai/computer:next-abc1234)'
        required: true
      sha7:
        description: 'Short git SHA (7 chars) for state tracking'
        required: true

concurrency:
  group: sandbox-smoke
  cancel-in-progress: false  # don't cancel in-flight smoke tests

jobs:
  smoke:
    name: Smoke test ${{ inputs.sha7 }}
    runs-on: [self-hosted, sandbox-builder]
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      passed: ${{ steps.smoke.outputs.passed }}
      sandbox_id: ${{ steps.provision.outputs.sandbox_id }}
      snapshot_id: ${{ steps.register.outputs.snapshot_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Circuit breaker check
        id: cb
        run: |
          bash scripts/ci-circuit-breaker.sh status || CB_EXIT=$?
          LOCKED=$(bash scripts/ci-circuit-breaker.sh status | grep '^locked=' | cut -d= -f2)
          echo "locked=$LOCKED" >> "$GITHUB_OUTPUT"
          if [ "$LOCKED" = "true" ]; then
            echo "::error::Circuit breaker is LOCKED. Run workflow unlock-promote.yml to reset."
            exit 1
          fi

      - name: Register snapshot with Daytona
        id: register
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: |
          DH_TAG="${{ inputs.dh_tag }}"
          SNAP_NAME="computer-${{ inputs.sha7 }}"
          echo "Registering snapshot: $DH_TAG as $SNAP_NAME"

          # Create snapshot
          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            -H "Content-Type: application/json" \
            "https://app.daytona.io/api/snapshots" \
            -d "{
              \"name\": \"$SNAP_NAME\",
              \"imageName\": \"$DH_TAG\",
              \"entrypoint\": [\"sleep\", \"infinity\"],
              \"cpu\": 2,
              \"mem\": 4,
              \"disk\": 10
            }") || { echo "Failed to create snapshot: $RESP"; exit 1; }

          SNAP_ID=$(echo "$RESP" | jq -r '.id // empty')
          if [ -z "$SNAP_ID" ]; then
            echo "Snapshot ID missing from response: $RESP"
            exit 1
          fi
          echo "snapshot_id=$SNAP_ID" >> "$GITHUB_OUTPUT"
          echo "snapshot_name=$SNAP_NAME" >> "$GITHUB_OUTPUT"
          echo "Snapshot registered: $SNAP_ID ($SNAP_NAME) — waiting for active..."

          # Poll until active (max 10 min)
          DEADLINE=$((SECONDS + 600))
          while [ $SECONDS -lt $DEADLINE ]; do
            STATE=$(curl -sf \
              -H "Authorization: Bearer $DAYTONA_API_KEY" \
              "https://app.daytona.io/api/snapshots/$SNAP_ID" \
              | jq -r '.state // "unknown"')
            echo "Snapshot state: $STATE (${SECONDS}s)"
            if [ "$STATE" = "active" ]; then
              echo "Snapshot active — ready to provision"
              break
            fi
            if [ "$STATE" = "error" ]; then
              ERR=$(curl -sf \
                -H "Authorization: Bearer $DAYTONA_API_KEY" \
                "https://app.daytona.io/api/snapshots/$SNAP_ID" \
                | jq -r '.errorReason // "unknown"')
              echo "::error::Snapshot failed to become active: $ERR"
              exit 1
            fi
            sleep 15
          done

      - name: Provision smoke sandbox
        id: provision
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: |
          SNAP_NAME="computer-${{ inputs.sha7 }}"
          echo "Provisioning smoke sandbox with snapshot: $SNAP_NAME"
          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            -H "Content-Type: application/json" \
            "https://app.daytona.io/api/sandbox" \
            -d "{
              \"snapshot\": \"$SNAP_NAME\",
              \"resources\": { \"cpu\": 2, \"memory\": 4, \"disk\": 10 },
              \"labels\": { \"purpose\": \"smoke-test\", \"sha7\": \"${{ inputs.sha7 }}\" }
            }") || { echo "Failed to provision sandbox: $RESP"; exit 1; }

          SANDBOX_ID=$(echo "$RESP" | jq -r '.id // empty')
          EXTERNAL_ID=$(echo "$RESP" | jq -r '.externalId // .id // empty')
          if [ -z "$EXTERNAL_ID" ]; then
            echo "Sandbox ID missing from response: $RESP"
            exit 1
          fi
          echo "sandbox_id=$EXTERNAL_ID" >> "$GITHUB_OUTPUT"
          echo "sandbox_db_id=$SANDBOX_ID" >> "$GITHUB_OUTPUT"
          echo "Sandbox provisioned: $EXTERNAL_ID"

      - name: Wait for sandbox ready
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: |
          SBID="${{ steps.provision.outputs.sandbox_id }}"
          DEADLINE=$((SECONDS + 300))
          while [ $SECONDS -lt $DEADLINE ]; do
            STATUS=$(curl -sf \
              -H "Authorization: Bearer $DAYTONA_API_KEY" \
              "https://app.daytona.io/api/sandbox/$SBID" \
              | jq -r '.state // .status // "unknown"')
            echo "Sandbox state: $STATUS (${SECONDS}s)"
            if [ "$STATUS" = "started" ] || [ "$STATUS" = "running" ]; then
              echo "Sandbox container ready"
              break
            fi
            if [ "$STATUS" = "error" ] || [ "$STATUS" = "failed" ]; then
              echo "Sandbox failed to start: $STATUS"
              exit 1
            fi
            sleep 10
          done

      - name: Bootstrap epsilon-master
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: |
          SBID="${{ steps.provision.outputs.sandbox_id }}"
          TOOLBOX="https://proxy.app-eu.daytona.io/toolbox/$SBID"
          echo "Triggering epsilon-daytona-start bootstrap..."
          curl -sf -X POST \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            -H "Content-Type: application/json" \
            "$TOOLBOX/process/execute" \
            -d '{"command":"setsid bash -c '\''nohup /usr/local/bin/epsilon-daytona-start > /tmp/eds.log 2>&1 < /dev/null &'\''","timeout":10}' \
            || echo "Warning: bootstrap trigger returned non-zero (may already be starting)"

          echo "Waiting up to 120s for epsilon-master to become ready..."
          DEADLINE=$((SECONDS + 120))
          while [ $SECONDS -lt $DEADLINE ]; do
            HEALTH=$(curl -sf -X POST \
              -H "Authorization: Bearer $DAYTONA_API_KEY" \
              -H "Content-Type: application/json" \
              "$TOOLBOX/process/execute" \
              -d '{"command":"curl -sf http://localhost:8000/epsilon/health","timeout":5}' \
              2>/dev/null | jq -r '.result // .output // ""' 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q "runtimeReady"; then
              echo "epsilon-master ready (${SECONDS}s)"
              break
            fi
            echo "Waiting for epsilon-master... (${SECONDS}s) health=$HEALTH"
            sleep 10
          done

          echo "=== Bootstrap log ==="
          curl -sf -X POST \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            -H "Content-Type: application/json" \
            "$TOOLBOX/process/execute" \
            -d '{"command":"tail -50 /tmp/eds.log 2>/dev/null || echo \"(no log)\"","timeout":10}' \
            | jq -r '.result // .output // ""' || true

          echo "=== epsilon-master process ==="
          curl -sf -X POST \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            -H "Content-Type: application/json" \
            "$TOOLBOX/process/execute" \
            -d '{"command":"pgrep -fa epsilon-master | head -5 || echo none","timeout":5}' \
            | jq -r '.result // .output // ""' || true

          echo "=== raw health response ==="
          curl -sf -X POST \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            -H "Content-Type: application/json" \
            "$TOOLBOX/process/execute" \
            -d '{"command":"curl -sv http://localhost:8000/epsilon/health 2>&1 || echo FAIL","timeout":10}' \
            | jq -r '.result // .output // ""' || true

      - name: Run smoke checks
        id: smoke
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: |
          SBID="${{ steps.provision.outputs.sandbox_id }}"
          chmod +x scripts/smoke-sandbox.sh
          if bash scripts/smoke-sandbox.sh "$SBID"; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::All smoke checks PASSED for ${{ inputs.sha7 }}"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Smoke checks FAILED for ${{ inputs.sha7 }}"
          fi

      - name: Cleanup smoke sandbox
        if: always() && steps.provision.outputs.sandbox_id != ''
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: |
          curl -sf -X DELETE \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            "https://app.daytona.io/api/sandbox/${{ steps.provision.outputs.sandbox_id }}" \
            || echo "Warning: failed to delete smoke sandbox (will auto-expire)"

      - name: Cleanup smoke snapshot
        if: always() && steps.register.outputs.snapshot_id != ''
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: |
          curl -sf -X DELETE \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            "https://app.daytona.io/api/snapshots/${{ steps.register.outputs.snapshot_id }}" \
            || echo "Warning: failed to delete smoke snapshot"

  promote:
    name: Auto-promote to stable
    needs: smoke
    if: needs.smoke.outputs.passed == 'true'
    runs-on: [self-hosted, sandbox-builder]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Retag next → stable (GHCR + Docker Hub)
        run: |
          # Pull from Docker Hub (already verified by smoke test)
          docker pull ${{ inputs.dh_tag }}

          # Tag and push stable to both registries
          docker tag ${{ inputs.dh_tag }} ghcr.io/deptrai/computer:stable
          docker push ghcr.io/deptrai/computer:stable

          docker tag ${{ inputs.dh_tag }} epsilonaicrypto/computer:stable
          docker push epsilonaicrypto/computer:stable

          echo "Promoted ${{ inputs.dh_tag }} → stable on GHCR + Docker Hub"

      - name: Register stable snapshot with Daytona
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: |
          # Delete old stable snapshot if exists
          OLD_ID=$(curl -sf \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            "https://app.daytona.io/api/snapshots" \
            | jq -r '.items // [] | .[] | select(.name == "computer-stable") | .id' 2>/dev/null || echo "")
          if [ -n "$OLD_ID" ]; then
            curl -sf -X DELETE \
              -H "Authorization: Bearer $DAYTONA_API_KEY" \
              "https://app.daytona.io/api/snapshots/$OLD_ID" || true
            echo "Deleted old stable snapshot: $OLD_ID"
          fi

          # Create new stable snapshot
          curl -sf -X POST \
            -H "Authorization: Bearer $DAYTONA_API_KEY" \
            -H "Content-Type: application/json" \
            "https://app.daytona.io/api/snapshots" \
            -d '{
              "name": "computer-stable",
              "imageName": "epsilonaicrypto/computer:stable",
              "entrypoint": ["sleep", "infinity"],
              "cpu": 2,
              "mem": 4,
              "disk": 10
            }' | jq '{id, name, state}'
          echo "Stable snapshot registered: epsilonaicrypto/computer:stable"

      - name: Write stable tag to state
        run: |
          mkdir -p /var/lib/sandbox-ci
          echo "${{ inputs.dh_tag }}" > /var/lib/sandbox-ci/current-stable-tag
          echo "${{ inputs.sha7 }}" > /var/lib/sandbox-ci/current-stable-sha7

      - name: Patch Dokploy DAYTONA_SNAPSHOT + redeploy API
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
        run: |
          APP_ID="SESgs1lTKXGJz0YMXmoxs"
          NEW_SNAPSHOT="epsilonaicrypto/computer:stable"

          if [ -z "$DOKPLOY_API_TOKEN" ] || [ -z "$DOKPLOY_API_URL" ]; then
            echo "::warning::DOKPLOY_API_TOKEN or DOKPLOY_API_URL not set — skipping Dokploy patch"
            exit 0
          fi

          CURRENT_ENV=$(curl -sf \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$DOKPLOY_API_URL/application.one?applicationId=$APP_ID" \
            | jq -r '.env // ""')

          NEW_ENV=$(echo "$CURRENT_ENV" \
            | sed "s|^DAYTONA_SNAPSHOT=.*|DAYTONA_SNAPSHOT=$NEW_SNAPSHOT|")

          if ! echo "$NEW_ENV" | grep -q "^DAYTONA_SNAPSHOT="; then
            NEW_ENV="$NEW_ENV"$'\n'"DAYTONA_SNAPSHOT=$NEW_SNAPSHOT"
          fi

          curl -sf -X POST \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$DOKPLOY_API_URL/application.saveEnvironment" \
            -d "$(jq -n --arg id "$APP_ID" --arg env "$NEW_ENV" '{applicationId: $id, env: $env}')"

          echo "Dokploy env patched: DAYTONA_SNAPSHOT=$NEW_SNAPSHOT"

          curl -sf -X POST \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$DOKPLOY_API_URL/application.redeploy" \
            -d "$(jq -n --arg id "$APP_ID" \
              --arg title "Auto-promote: sandbox stable → ${{ inputs.sha7 }}" \
              '{applicationId: $id, title: $title}')"

          echo "API redeploy triggered"

      - name: Record circuit breaker pass
        run: bash scripts/ci-circuit-breaker.sh record-pass "${{ inputs.sha7 }}"

      - name: Notify Telegram (promote success)
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="✅ *Sandbox promoted* to \`stable\`%0A"
          MSG+="SHA: \`${{ inputs.sha7 }}\`%0A"
          MSG+="Smoke: all 5 checks PASSED%0A"
          MSG+="Dokploy DAYTONA_SNAPSHOT patched + API redeploy triggered"
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&parse_mode=Markdown&text=${MSG}" > /dev/null

      - name: Summary
        run: |
          echo "## Auto-Promote: PASSED ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: \`${{ inputs.sha7 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stable: \`epsilonaicrypto/computer:stable\` + \`ghcr.io/deptrai/computer:stable\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dokploy DAYTONA_SNAPSHOT updated" >> "$GITHUB_STEP_SUMMARY"

  on-smoke-fail:
    name: Record failure
    needs: smoke
    if: needs.smoke.outputs.passed == 'false' || failure()
    runs-on: [self-hosted, sandbox-builder]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Record circuit breaker failure
        run: bash scripts/ci-circuit-breaker.sh record-fail "${{ inputs.sha7 }}"
      - name: Notify Telegram (smoke fail)
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CB_STATUS=$(bash scripts/ci-circuit-breaker.sh status | grep '^consecutive_failures=' | cut -d= -f2 || echo '?')
          MSG="❌ *Sandbox smoke FAILED* for \`${{ inputs.sha7 }}\`%0A"
          MSG+="Image: \`${{ inputs.dh_tag }}\`%0A"
          MSG+="Consecutive failures: ${CB_STATUS}/3%0A"
          if [ "${CB_STATUS}" = "3" ]; then
            MSG+="⚠️ Circuit breaker LOCKED — run unlock-promote.yml after investigation"
          fi
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&parse_mode=Markdown&text=${MSG}" > /dev/null
      - name: Summary
        run: |
          echo "## Auto-Promote: FAILED ❌" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: \`${{ inputs.sha7 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ inputs.dh_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
