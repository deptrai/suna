# GitHub Actions CI/CD Pipeline for Test Execution
# Generated by BMad TEA Agent - Test Architect Module
# Optimized for: Playwright, Parallel Sharding, Burn-In Loop

name: Test Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/test.yml'
  schedule:
    # Weekly burn-in on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.11.0' # Use Node LTS, update if .nvmrc exists
  # Optional: Configure notification webhook (add SLACK_WEBHOOK secret in GitHub Settings)
  # SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  # Lint stage - Code quality checks
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run format check
        run: npm run format:check || true  # Optional, won't fail pipeline

  # Test stage - Parallel execution with sharding
  test:
    name: Test (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    defaults:
      run:
        working-directory: ./frontend

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/4
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}

      - name: Generate test coverage summary
        if: always()
        run: |
          echo "### Test Coverage Summary (Shard ${{ matrix.shard }})" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed for shard ${{ matrix.shard }}/4" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # Priority-based test execution (P0 critical paths)
  test-p0:
    name: Test P0 (Critical Paths)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run P0 tests (critical paths)
        run: npm run test:e2e:p0
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}

      - name: Generate P0 test summary
        if: always()
        run: |
          echo "### P0 Critical Path Tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ P0 tests completed" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload P0 test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-p0
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # Burn-in stage - Flaky test detection
  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [test, test-p0]
    # Only run burn-in on PRs to main/develop or on schedule
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Detect changed test files
        id: changed-tests
        run: |
          CHANGED_SPECS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E 'frontend/tests/.*\.(spec|test)\.(ts|js|tsx|jsx)$' || echo "")
          if [ -z "$CHANGED_SPECS" ]; then
            echo "changed_specs=" >> $GITHUB_OUTPUT
            echo "No changed test files detected, running all tests"
          else
            echo "changed_specs=${CHANGED_SPECS}" >> $GITHUB_OUTPUT
            echo "Changed specs: ${CHANGED_SPECS}"
          fi

      - name: Run burn-in loop (10 iterations)
        run: |
          echo "🔥 Starting burn-in loop - detecting flaky tests"
          if [ -z "${{ steps.changed-tests.outputs.changed_specs }}" ]; then
            # No changed specs, run full suite
            TEST_COMMAND="npm run test:e2e"
          else
            # Run only changed specs
            TEST_COMMAND="npm run test:e2e -- ${{ steps.changed-tests.outputs.changed_specs }}"
          fi
          
          for i in {1..10}; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Burn-in iteration $i/10"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            eval $TEST_COMMAND || exit 1
          done
          echo "✅ Burn-in complete - no flaky tests detected"
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # Report stage - Aggregate and publish results
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test, test-p0, burn-in]
    if: always()
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Status**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **P0 Tests**: ${{ needs.test-p0.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Burn-in**: ${{ needs.burn-in.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Shards**: 4 parallel jobs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ **Test failures detected** - Review test artifacts" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test-p0.result }}" == "failure" ]; then
            echo "🚨 **P0 (Critical) test failures** - Blocking deployment" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "⚠️ **Flaky tests detected** - Review burn-in artifacts" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.test-p0.result }}" == "success" ] && [ "${{ needs.burn-in.result }}" == "success" ]; then
            echo "✅ **All tests passing** - Ready for merge" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure (Slack)
        if: failure() && secrets.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "text": "🚨 Test Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚨 Test Pipeline Failed*\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.event.head_commit.url }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Test Status:*\n${{ needs.test.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*P0 Tests:*\n${{ needs.test-p0.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Burn-in:*\n${{ needs.burn-in.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                    }
                  ]
                }
              ]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
