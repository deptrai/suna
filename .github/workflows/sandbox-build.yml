name: Sandbox Image Build

# Builds the thin sandbox image (Dockerfile): epsilon-master source + bun install.
# Inherits from ghcr.io/deptrai/computer:base-latest.
# Tag: next-<sha7>. Build time ~5-8 min.
#
# Triggers:
#   - Path filter: epsilon-master source, scripts, s6 services, Dockerfile changed on main
#   - workflow_dispatch: manual build with optional base image override
#
# After a successful build, triggers sandbox-smoke.yml for smoke + auto-promote.

on:
  push:
    branches: [main]
    paths:
      - 'core/epsilon-master/**'
      - 'core/s6-services/**'
      - 'core/services/**'
      - 'core/init-scripts/**'
      - 'core/scripts/**'
      - 'core/startup.sh'
      - 'core/daytona-start.sh'
      - 'core/docker/Dockerfile'
  workflow_dispatch:
    inputs:
      base_tag:
        description: 'Base image tag override (default: base-latest)'
        required: false
        default: 'base-latest'
      skip_smoke:
        description: 'Skip smoke test + auto-promote'
        type: boolean
        default: false

concurrency:
  group: sandbox-build
  cancel-in-progress: true  # newer push supersedes in-flight build

jobs:
  build-thin:
    name: Build thin image
    runs-on: [self-hosted, sandbox-builder]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tags.outputs.tag_sha }}
      sha7: ${{ steps.tags.outputs.sha7 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Compute tags
        id: tags
        run: |
          SHA7=$(git rev-parse --short HEAD)
          BASE="${{ inputs.base_tag || 'base-latest' }}"
          echo "sha7=$SHA7" >> "$GITHUB_OUTPUT"
          echo "tag_sha=ghcr.io/deptrai/computer:next-$SHA7" >> "$GITHUB_OUTPUT"
          echo "base_image=ghcr.io/deptrai/computer:$BASE" >> "$GITHUB_OUTPUT"
          echo "Building next-$SHA7 from base $BASE"

      - name: Circuit breaker check
        id: cb
        run: |
          STATE_FILE=/var/lib/sandbox-ci/promote-history.json
          if [ ! -f "$STATE_FILE" ]; then
            echo "locked=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LOCKED=$(jq -r '.locked // false' "$STATE_FILE")
          echo "locked=$LOCKED" >> "$GITHUB_OUTPUT"
          if [ "$LOCKED" = "true" ]; then
            REASON=$(jq -r '.lock_reason // "unknown"' "$STATE_FILE")
            echo "::warning::Circuit breaker LOCKED: $REASON — auto-promote disabled for this build"
          fi

      - name: Build and push thin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: core/docker/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.tags.outputs.base_image }}
            SANDBOX_VERSION=${{ github.sha }}
          tags: ${{ steps.tags.outputs.tag_sha }}
          cache-from: type=registry,ref=ghcr.io/deptrai/computer:stable
          cache-to: type=inline

      - name: Summary
        if: always()
        run: |
          echo "## Sandbox Thin Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`next-${{ steps.tags.outputs.sha7 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base: \`${{ steps.tags.outputs.base_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Circuit breaker locked: ${{ steps.cb.outputs.locked }}" >> "$GITHUB_STEP_SUMMARY"

  trigger-smoke:
    name: Trigger smoke test
    needs: build-thin
    if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.skip_smoke == false))
    runs-on: [self-hosted, sandbox-builder]
    steps:
      - name: Dispatch smoke workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'sandbox-smoke.yml',
              ref: context.ref,
              inputs: {
                image_tag: '${{ needs.build-thin.outputs.image_tag }}',
                sha7: '${{ needs.build-thin.outputs.sha7 }}'
              }
            });
            console.log('Smoke workflow dispatched for ${{ needs.build-thin.outputs.image_tag }}');
