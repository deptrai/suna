name: Sync registry artifacts

on:
  push:
    branches:
      - master
    paths:
      - 'skills/**'
      - 'scripts/build_registry.py'
      - '.github/workflows/sync-registry-artifacts.yml'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build registry artifacts
        run: python3 scripts/build_registry.py

      - name: Detect generated changes
        id: changes
        run: |
          if git diff --quiet -- public registry.json ocx.jsonc worker/index.ts; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public registry.json ocx.jsonc worker/index.ts
          git commit -m "chore: sync registry artifacts"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy registry site
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: 9785405a992435bb0c7bd19f9b6d26d5
        run: npx wrangler@4 pages deploy ./public --project-name=epsilon-registry --branch=master
