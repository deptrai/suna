# Pre-commit hook configuration
# Install with: pip install pre-commit && pre-commit install
# Or use the manual hook at .git/hooks/pre-commit

repos:
  - repo: local
    hooks:
      - id: gate-decision-check
        name: Quality Gate Decision Check
        entry: scripts/enforce-gate-decision.py
        language: system
        files: ^docs/gate-decision-story-.*\.yaml$
        args: ['--strict']
        pass_filenames: true
        always_run: false

